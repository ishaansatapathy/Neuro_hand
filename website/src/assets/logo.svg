<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="8" y1="6" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="36" height="36" rx="10" fill="url(#bg)"/>
  <!-- Brain outline (left hemisphere) -->
  <path d="M18 7c-4 0-7 2.5-7 6.5 0 1.8.8 3.2 1.5 4.2.7 1 1 2.2.5 3.3l-1 2.5c-.3.8.3 1.5 1.1 1.5h5" stroke="url(#glow)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Brain outline (right hemisphere) -->
  <path d="M18 7c4 0 7 2.5 7 6.5 0 1.8-.8 3.2-1.5 4.2-.7 1-1 2.2-.5 3.3l1 2.5c.3.8-.3 1.5-1.1 1.5h-5" stroke="url(#glow)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Center line -->
  <line x1="18" y1="8" x2="18" y2="25" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <!-- Neural dots -->
  <circle cx="14" cy="11" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="22" cy="11" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="12" cy="16" r="1" fill="white" opacity="0.7"/>
  <circle cx="24" cy="16" r="1" fill="white" opacity="0.7"/>
  <circle cx="15" cy="20" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="21" cy="20" r="0.8" fill="white" opacity="0.5"/>
  <!-- Neural connections -->
  <line x1="14" y1="11" x2="12" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="22" y1="11" x2="24" y2="16" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="14" y1="11" x2="22" y2="11" stroke="white" stroke-width="0.4" opacity="0.2"/>
  <line x1="12" y1="16" x2="24" y2="16" stroke="white" stroke-width="0.4" opacity="0.15"/>
  <!-- Hand fingers (below brain) -->
  <path d="M14 27v-2M16 28v-3M18 28.5v-3.5M20 28v-3M22 27v-2" stroke="url(#glow)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <!-- Palm arc -->
  <path d="M13.5 27c0 1.5 2 3 4.5 3s4.5-1.5 4.5-3" stroke="url(#glow)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
